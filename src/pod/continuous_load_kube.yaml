chaos_node_workflow_very_new:
  schedule: "@once"
  start_date: "2025-01-18"
  description: "Chaos Workflow DAG - Kubernetes Pod"
  default_view: "graph"
  orientation: "LR"
  catchup: false
  default_args:
    owner: "airflow"
    depends_on_past: false
    retries: 0
  tasks:
    - task_id: "taskA"
      operator: airflow.providers.cncf.kubernetes.operators.pod.KubernetesPodOperator
      name: "chaos-node-workflow-a"
      namespace: "chaos-ops"
      image: "airflow_chaos:latest"
      get_logs: true
      is_delete_operator_pod: false
      in_cluster: true
      service_account_name: "chaos-platform-sa"
      cmds:
        - bash
        - -c
      arguments:
        - |
          cd /opt/airflow/src/pod
          chaos run container_restart.json
      env_vars:
        KUBECONFIG: "/root/.kube/config"
