Cordon_Uncordon_Node_Test_Kube:
  schedule: "@once"
  start_date: "2025-01-10"
  description: "Cordon-Uncordon Node with Pod Restart Experiment - Kubernetes Pod"
  default_view: "graph"
  orientation: "LR"
  catchup: false
  default_args:
    owner: "airflow"
    depends_on_past: false
    retries: 0
  tasks:
    - task_id: apply_cordon_uncordon_kube
      operator: airflow.providers.cncf.kubernetes.operators.pod.KubernetesPodOperator
      name: "cordon-uncordon-k8s"
      namespace: "chaos-ops"
      image: "priyanshu01ce/airflow_chaos:latest"
      get_logs: true
      is_delete_operator_pod: false
      in_cluster: true
      service_account_name: "chaos-platform-sa"
      cmds:
        - bash
        - -c
      arguments:
        - |
          cd /opt/airflow/src/pod
          ls -la
          echo "Starting cordon-uncordon node experiment..."
          chaos run cordon-uncordon-node.json
          echo "Cordon-uncordon experiment completed successfully"
      env_vars:
        PYTHONPATH: "/opt/airflow/src/pod"
