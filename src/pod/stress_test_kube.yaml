Stress_Test_Kube:
  schedule: "0 */2 * * *"  # Every 2 hours
  start_date: "2025-09-22"
  description: "Load Test with Auto Cleanup via Python Script - Kubernetes Pod"
  default_view: "graph"
  orientation: "LR"
  catchup: false
  default_args:
    owner: "airflow"
    depends_on_past: false
    retries: 0
  tasks:
    - task_id: run_load_test_with_cleanup_kube
      operator: airflow.providers.cncf.kubernetes.operators.pod.KubernetesPodOperator
      name: "load-test-cleanup-k8s"
      namespace: "chaos-ops"
      image: "priyanshu01ce/airflow_chaos:latest"
      get_logs: true
      is_delete_operator_pod: false
      in_cluster: true
      service_account_name: "chaos-platform-sa"
      cmds:
        - bash
        - -c
      arguments:
        - |
          cd /opt/airflow/src/pod
          echo "Starting Load Test with Auto Cleanup..."
          chaos run load_test_cleanup.json
          echo "Load test with cleanup completed successfully"
      env_vars:
        PYTHONPATH: "/opt/airflow/src/pod"
