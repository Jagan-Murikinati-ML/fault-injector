apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-platform
  namespace: chaos-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-platform
  template:
    metadata:
      labels:
        app: chaos-platform
    spec:
      serviceAccountName: chaos-platform-sa
      initContainers:
      - name: copy-dags
        image: busybox:1.35
        command: ['sh', '-c']
        args:
        - |
          rm -rf /opt/airflow/src/pod/*
          rm -rf /opt/airflow/dags/*
          cd /tmp/chaos-experiments
          for file in *; do
            if [ -f "$file" ] || [ -L "$file" ]; then
              cat "$file" > "/opt/airflow/src/pod/$file"
            fi
          done
          cd /tmp/airflow-dags
          for file in *; do
            if [ -f "$file" ] || [ -L "$file" ]; then
              cat "$file" > "/opt/airflow/dags/$file"
            fi
          done
        volumeMounts:
        - name: chaos-experiments-source
          mountPath: /tmp/chaos-experiments
        - name: airflow-dags-source
          mountPath: /tmp/airflow-dags
        - name: chaos-experiments
          mountPath: /opt/airflow/src/pod
        - name: airflow-dags
          mountPath: /opt/airflow/dags
      containers:
      - name: airflow
        image: priyanshu01ce/airflow_chaos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "CeleryExecutor"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
        - name: AIRFLOW__CELERY__RESULT_BACKEND
          value: "db+postgresql://airflow:airflow@postgres:5432/airflow"
        - name: AIRFLOW__CELERY__BROKER_URL
          value: "redis://redis:6379/0"
        - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
          value: "false"
        - name: PYTHONPATH
          value: "/opt/airflow/src/pod:/opt/airflow/src/node"
        volumeMounts:
        - name: chaos-experiments
          mountPath: /opt/airflow/src/pod
        - name: airflow-dags
          mountPath: /opt/airflow/dags
        - name: docker-sock
          mountPath: /var/run/docker.sock
        command: ["/bin/bash", "-c"]
        args:
        - |
          until pg_isready -h postgres -p 5432 -U airflow; do
            echo 'Waiting for PostgreSQL...'
            sleep 3
          done
          airflow db migrate
          airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
          airflow webserver --port 8080 &
          airflow scheduler &
          airflow celery worker
        securityContext:
          privileged: true
      volumes:
      - name: chaos-experiments-source
        configMap:
          name: chaos-experiments
      - name: airflow-dags-source
        configMap:
          name: airflow-dags
      - name: chaos-experiments
        emptyDir: {}
      - name: airflow-dags
        emptyDir: {}
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
