services:
  nodejs-bff:
    build: ./src/backend/services/nodejs-bff
    ports:
      - "3000:3000"
    environment:
      - SEARCH_SERVICE_URL=http://search-service:8000
      - AUTH_SERVICE_URL=http://authentication-service:9000
      - BOOKING_SERVICE_URL=http://booking-service:8001
      - JWT_SECRET=MyApp-Super-Secret-Key-2024-Docker
      # OpenTelemetry Tracing Configuration
      - TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=nodejs-bff
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=hotel-reservation,service.version=1.0.0
    depends_on:
      - search-service
      - authentication-service
      - booking-service
      - otel-collector
    volumes:
      - ./src/backend/services/nodejs-bff:/app
      - /app/node_modules
    networks:
      - hotel_network

  search-service:
    build: ./src/backend/services/search_service
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - JWT_SECRET=MyApp-Super-Secret-Key-2024-Docker
      # OpenTelemetry Tracing Configuration
      - TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=search-service
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=hotel-reservation,service.version=1.0.0
    depends_on:
      - elasticsearch
      - otel-collector
    volumes:
      - ./src/backend/services/search_service:/app
    networks:
      - hotel_network

  authentication-service:
    build: ./src/backend/services/authentication
    ports:
      - "9000:9000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=MyApp-Super-Secret-Key-2024-Docker
      # OpenTelemetry Tracing Configuration
      - TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=authentication-service
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=hotel-reservation,service.version=1.0.0
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
    depends_on:
      - postgres
      - otel-collector
    networks:
      - hotel_network

  booking-service:
    build: ./src/backend/services/booking_service
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hotel_booking_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=MyApp-Super-Secret-Key-2024-Docker
      - SEARCH_SERVICE_URL=http://search-service:8000
    depends_on:
      - postgres
      - search-service
    volumes:
      - ./src/backend/services/booking_service:/app
    networks:
      - hotel_network

  postgres:
    image: postgres:16
    container_name: hotel_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hotel_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - hotel_network

  frontend:
    build: ./src/frontend/hotel-reservation-ui
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # OpenTelemetry Tracing Configuration
      - REACT_APP_TRACING_ENABLED=true
      - REACT_APP_OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318/v1/traces
      - REACT_APP_OTEL_SERVICE_NAME=frontend
    depends_on:
      - otel-collector
    volumes:
      - ./src/frontend/hotel-reservation-ui:/app
      - /app/node_modules
    networks:
      - hotel_network

  invoice-service:
    build: ./src/backend/services/invoice-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
    networks:
      - hotel_network

  booking-post-processing-service:
    build: ./src/backend/services/booking-post-processing-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVOICE_SERVICE_URL=http://invoice-service:8003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hotel_booking_db
      - DB_USER=postgres
      - DB_PASSWORD=password
    depends_on:
      - kafka
      - postgres
      - invoice-service
    volumes:
      - ./src/backend/services/booking-post-processing-service:/app
    networks:
      - hotel_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - hotel_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - hotel_network
  # ******************
  # Telemetry Services
  # ******************

  # OpenTelemetry Collector - Receives traces from all services
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: hotel-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - hotel_network
    restart: unless-stopped

  # Jaeger - Distributed Tracing UI
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: hotel-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # ✅ NEW: Badger Storage with 1 Hour TTL
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
      - BADGER_SPAN_STORE_TTL=1h  # ✅ 1 HOUR RETENTION!
    volumes:
      - jaeger_badger_data:/badger  # ✅ NEW VOLUME
    user: root 
      
    networks:
      - hotel_network
    restart: unless-stopped

volumes:
  es_data:
  postgres_data:
  jaeger_badger_data:

networks:
  hotel_network:
    driver: bridge


















