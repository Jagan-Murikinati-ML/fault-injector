server:
  port: 9000

spring:
  application:
    name: authentication-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_auth_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:MyApp-Super-Secret-Key-2024}
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.hotelreservation: DEBUG