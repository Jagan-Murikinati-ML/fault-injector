server:
  port: 9000

spring:
  application:
    name: authentication-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_auth_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:MyApp-Super-Secret-Key-2024}
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.hotelreservation: DEBUG

# OpenTelemetry Tracing Configuration
otel:
  enabled: ${TRACING_ENABLED:true}
  service:
    name: ${OTEL_SERVICE_NAME:authentication-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  resource:
    attributes: ${OTEL_RESOURCE_ATTRIBUTES:service.namespace=hotel-reservation,service.version=1.0.0}